<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试合集 - 心理测试</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">心理测试</a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="catalog.html" class="active">测试合集</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="container">
        <div class="hero fade-in" style="padding: 40px 20px;">
            <h1>测试合集</h1>
            <p class="subtitle">探索更多有趣的心理测试，了解真实的自己</p>
        </div>

        <!-- 测试卡片网格 -->
        <div class="catalog-grid fade-in" id="catalog-grid">
            <!-- 当前测试卡片 -->
            <a href="index.html" class="catalog-card" id="current-quiz-card">
                <div class="catalog-card-image" style="padding: 0; overflow: hidden;">
                    <img src="assets/images/首页.png" alt="爱的解码" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div class="catalog-card-content">
                    <span style="display: inline-block; padding: 4px 12px; background: var(--secondary-color); 
                                 color: var(--primary-color); border-radius: 20px; font-size: 0.75rem; margin-bottom: 8px;">
                        当前测试
                    </span>
                    <h3 id="card-title">爱的解码</h3>
                    <p id="card-desc">找到你发射和接收爱的信号</p>
                </div>
            </a>
            
            <!-- 更多测试卡片 -->
            <div class="catalog-card" style="cursor: default;">
                <div class="catalog-card-image" style="background: linear-gradient(135deg, #f5f5f5, #e8e8e8); display: flex; align-items: center; justify-content: center;">
                </div>
                <div class="catalog-card-content">
                    <h3 style="color: #999;">更多心理测试</h3>
                    <p style="color: #aaa;">正在筹备中，敬请期待！</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer style="text-align: center; padding: 40px 20px; margin-top: 40px; background: linear-gradient(to bottom, transparent, rgba(255,140,148,0.05)); border-top: 1px solid rgba(255,140,148,0.1);">
        <div style="max-width: 800px; margin: 0 auto;">
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin: 0 0 8px;">
                <span style="font-weight: 600; color: var(--primary-color);">心理测试</span> © 2026 起源研究社 Origin Lab
            </p>
            <p style="color: #aaa; font-size: 0.75rem; margin: 0; line-height: 1.6;">
                保留所有权利 | 仅供娱乐参考，不构成专业建议
            </p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script>
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', () => {
            applyUIConfig();
        });
    </script>
</body>
</html>
