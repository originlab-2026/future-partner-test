<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理测试</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">心理测试</a>
            <ul class="nav-links">
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="catalog.html">测试合集</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="container">
        <!-- 首页 Banner 图片 -->
        <div class="fade-in" style="margin: 0; text-align: center;">
            <picture>
                <source srcset="assets/images/首页.webp" type="image/webp">
                <source srcset="assets/images/首页.png" type="image/png">
                <img src="assets/images/首页.png?v=3" 
                     alt="起源研究社心理测试 - 爱的五种语言" 
                     loading="eager"
                     fetchpriority="high"
                     decoding="async"
                     style="width: 100%; max-width: 1024px; height: auto; display: block; margin: 0 auto;">
            </picture>
        </div>
        
        <!-- 开始测试按钮 -->
        <div style="text-align: center; margin: 0 0 32px;">
            <a href="quiz.html" id="start-btn">
                <picture>
                    <source srcset="assets/images/按钮 - 开始测试.webp" type="image/webp">
                    <source srcset="assets/images/按钮 - 开始测试.png" type="image/png">
                    <img src="assets/images/按钮 - 开始测试.png" 
                         alt="开始测试" 
                         loading="eager"
                         fetchpriority="high"
                         decoding="async"
                         style="width: 200px; height: auto; cursor: pointer; transition: transform 0.2s ease;"
                         onmouseover="this.style.transform='scale(1.05)'"
                         onmouseout="this.style.transform='scale(1)'">
                </picture>
            </a>
        </div>

        <!-- 测试描述 -->
        <div class="card fade-in" style="margin-top: 24px; padding: 28px;">
            <p style="font-size: 0.95rem; line-height: 1.9; color: #555; margin: 0 0 16px; text-align: left;">
                在每一段亲密关系中，我们都有自己最擅长接收爱的方式——那是属于你的<span style="color: #FF8C94; font-weight: 600;">「爱的母语」</span>。有时不是爱消失了，而是我们用自己习惯的方式表达，对方却未能接收到。
            </p>
            <p style="font-size: 0.95rem; line-height: 1.9; color: #555; margin: 0 0 16px; text-align: left;">
                本测试基于心理学家 Gary Chapman 博士提出的「五种爱语」理论，通过一系列情景选择，帮助你发现自己在亲密关系中最看重的情感表达方式，让你更懂自己，也更懂如何爱身边的人。
            </p>
            <p style="font-size: 0.95rem; line-height: 1.8; color: #555; margin: 0; text-align: center; font-weight: 500;">
                了解自己的爱语，也让彼此更懂如何去爱。
            </p>
        </div>

        <!-- 测试信息 -->
        <div style="margin-top: 20px; padding: 18px 24px; background: linear-gradient(135deg, #FFF5F5 0%, #FFFAFA 100%); border-radius: 16px; display: flex; justify-content: space-between; flex-wrap: wrap; box-shadow: 0 4px 20px rgba(255,140,148,0.15); border: 1px solid rgba(255,140,148,0.2);">
            <div style="flex: 1; text-align: center; position: relative;">
                <div style="font-size: 0.75rem; color: #999; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;">题目总数</div>
                <span style="font-size: 1.4rem; color: #FF6B6B; font-weight: 700;" id="question-count">-</span>
                <span style="font-size: 0.85rem; color: #FF8C94; font-weight: 500; margin-left: 2px;">题</span>
            </div>
            <div style="width: 1px; background: linear-gradient(to bottom, transparent, rgba(255,140,148,0.3), transparent); margin: 0 16px;"></div>
            <div style="flex: 1; text-align: center;">
                <div style="font-size: 0.75rem; color: #999; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;">预计时长</div>
                <span style="font-size: 1.4rem; color: #FF6B6B; font-weight: 700;">2-3</span>
                <span style="font-size: 0.85rem; color: #FF8C94; font-weight: 500; margin-left: 2px;">分钟</span>
            </div>
        </div>

        <!-- 维度预览 -->
        <div class="fade-in" style="margin-top: 28px;">
            <h2 style="text-align: center; font-size: 1.1rem; color: #555; margin-bottom: 20px;">五大爱语维度</h2>
            <div id="dimensions-preview">
                <!-- 动态生成 -->
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer style="text-align: center; padding: 40px 20px; margin-top: 40px; background: linear-gradient(to bottom, transparent, rgba(255,140,148,0.05)); border-top: 1px solid rgba(255,140,148,0.1);">
        <div style="max-width: 800px; margin: 0 auto;">
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin: 0 0 8px;">
                <span style="font-weight: 600; color: var(--primary-color);">心理测试</span> © 2026 起源研究社 Origin Lab
            </p>
            <p style="color: #aaa; font-size: 0.75rem; margin: 0; line-height: 1.6;">
                保留所有权利 | 仅供娱乐参考，不构成专业建议
            </p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script>
        // 默认测试数据（备用）
        const defaultQuizData = {
            "quiz_name": "爱的五种语言测试",
            "reference": "Gary Chapman 的五种爱语理论",
            "nbr_question": 30,
            "dimensions": [
                {"dimension_name": "肯定的言语", "description": "用语言表达爱和鼓励"},
                {"dimension_name": "高质量陪伴", "description": "重视一起度过的专注时间"},
                {"dimension_name": "收到礼物", "description": "通过礼物感受被爱"},
                {"dimension_name": "服务的行动", "description": "通过行动、帮助对方表达爱"},
                {"dimension_name": "身体接触", "description": "通过拥抱、牵手等身体接触感受爱"}
            ]
        };

        // 加载测试数据
        async function loadQuizData() {
            try {
                // 先检查 localStorage 中是否有自定义测试数据
                let quizData = StorageUtil.get(StorageKeys.QUIZ_DATA);
                
                // 检查 localStorage 数据是否有效（必须包含题目数据）
                if (quizData && (!quizData.scale_questions || !quizData.choice_questions)) {
                    console.warn('localStorage 数据不完整，清除后重新加载');
                    StorageUtil.remove(StorageKeys.QUIZ_DATA);
                    quizData = null;
                }
                
                // 如果没有有效数据，加载默认数据
                if (!quizData) {
                    let loadSuccess = false;
                    // 使用相对路径加载
                    try {
                        const response = await fetch('data/default-quiz.json?v=' + Date.now());
                        if (response.ok) {
                            quizData = await response.json();
                            StorageUtil.set(StorageKeys.QUIZ_DATA, quizData);
                            console.log('成功加载 JSON 数据');
                            loadSuccess = true;
                        }
                    } catch (e) {
                        console.warn('加载失败:', e);
                    }
                    // 如果都失败了，使用内置数据
                    if (!loadSuccess) {
                        console.warn('无法加载 JSON 文件，使用内置默认数据');
                        quizData = defaultQuizData;
                        StorageUtil.set(StorageKeys.QUIZ_DATA, quizData);
                    }
                } else {
                    console.log('使用 localStorage 缓存的数据');
                }

                // 更新页面内容
                const quizTitleEl = document.getElementById('quiz-title');
                const quizRefEl = document.getElementById('quiz-reference');
                if (quizTitleEl) quizTitleEl.textContent = quizData.quiz_name;
                if (quizRefEl) quizRefEl.textContent = quizData.reference;
                document.getElementById('question-count').textContent = `${quizData.nbr_question || 30} `;

                // 更新维度预览 - 横向滑动轮播
                const dimensionsContainer = document.getElementById('dimensions-preview');
                if (quizData.dimensions && quizData.dimensions.length > 0) {
                    const timestamp = Date.now();
                    dimensionsContainer.innerHTML = `
                        <style>
                            .dimensions-carousel {
                                position: relative;
                                overflow: hidden;
                                padding: 0 40px;
                            }
                            .dimensions-track {
                                display: flex;
                                gap: 16px;
                                transition: transform 0.3s ease;
                            }
                            .dimension-card {
                                flex: 0 0 calc(33.333% - 11px);
                                background: white;
                                border-radius: 20px;
                                padding: 32px 24px;
                                text-align: center;
                                box-shadow: 0 4px 20px rgba(0,0,0,0.08);
                                border: 1px solid #f0f0f0;
                            }
                            .dimension-card img {
                                width: 140px;
                                height: 140px;
                                object-fit: contain;
                                margin-bottom: 12px;
                            }
                            .dimension-card h3 {
                                margin: 0 0 12px;
                                font-size: 1.1rem;
                                color: #333;
                                font-weight: 600;
                            }
                            .dimension-card p {
                                margin: 0;
                                font-size: 0.9rem;
                                color: #888;
                                line-height: 1.7;
                            }
                            .carousel-btn {
                                position: absolute;
                                top: 50%;
                                transform: translateY(-50%);
                                width: 40px;
                                height: 40px;
                                background: white;
                                border: none;
                                border-radius: 50%;
                                box-shadow: 0 2px 12px rgba(0,0,0,0.15);
                                cursor: pointer;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                z-index: 10;
                                transition: all 0.2s ease;
                            }
                            .carousel-btn:hover {
                                background: #FF8C94;
                                color: white;
                            }
                            .carousel-btn.prev { left: 0; }
                            .carousel-btn.next { right: 0; }
                            .carousel-btn:disabled {
                                opacity: 0.3;
                                cursor: not-allowed;
                            }
                            .carousel-dots {
                                display: flex;
                                justify-content: center;
                                gap: 8px;
                                margin-top: 20px;
                            }
                            .carousel-dot {
                                width: 8px;
                                height: 8px;
                                border-radius: 50%;
                                background: #ddd;
                                cursor: pointer;
                                transition: all 0.2s ease;
                            }
                            .carousel-dot.active {
                                background: #FF8C94;
                                width: 24px;
                                border-radius: 4px;
                            }
                            @media (max-width: 768px) {
                                .dimensions-carousel { padding: 0 32px; }
                                .dimension-card {
                                    flex: 0 0 calc(50% - 8px);
                                    padding: 24px 16px;
                                }
                                .dimension-card img {
                                    width: 120px;
                                    height: 120px;
                                }
                                .dimension-card h3 {
                                    font-size: 1rem;
                                }
                                .dimension-card p {
                                    font-size: 0.85rem;
                                }
                            }
                            @media (max-width: 480px) {
                                .dimensions-carousel { padding: 0 24px; }
                                .dimension-card {
                                    flex: 0 0 100%;
                                    padding: 28px 20px;
                                }
                            }
                        </style>
                        <div class="dimensions-carousel">
                            <button class="carousel-btn prev" onclick="moveCarousel(-1)">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg>
                            </button>
                            <div class="dimensions-track" id="dimensionsTrack">
                                ${quizData.dimensions.map(dim => `
                                    <div class="dimension-card">
                                        <picture>
                                            <source srcset="assets/icon/${dim.dimension_name}.webp" type="image/webp">
                                            <source srcset="assets/icon/${dim.dimension_name}.png" type="image/png">
                                            <img src="assets/icon/${dim.dimension_name}.png?v=${timestamp}" alt="${dim.dimension_name}" loading="lazy" decoding="async">
                                        </picture>
                                        <h3>${dim.dimension_name}</h3>
                                        <p>${dim.description}</p>
                                    </div>
                                `).join('')}
                            </div>
                            <button class="carousel-btn next" onclick="moveCarousel(1)">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>
                        <div class="carousel-dots" id="carouselDots"></div>
                    `;
                    initCarousel();
                }

            } catch (error) {
                console.error('加载测试数据失败:', error);
                // 使用内置默认数据作为最后备用
                const quizTitleEl = document.getElementById('quiz-title');
                const quizRefEl = document.getElementById('quiz-reference');
                if (quizTitleEl) quizTitleEl.textContent = defaultQuizData.quiz_name;
                if (quizRefEl) quizRefEl.textContent = defaultQuizData.reference;
                document.getElementById('question-count').textContent = `${defaultQuizData.nbr_question} `;
                
                const dimensionsContainer = document.getElementById('dimensions-preview');
                const timestamp = Date.now();
                dimensionsContainer.innerHTML = `
                    <style>
                        .dimensions-carousel {
                            position: relative;
                            overflow: hidden;
                            padding: 0 40px;
                        }
                        .dimensions-track {
                            display: flex;
                            gap: 16px;
                            transition: transform 0.3s ease;
                        }
                        .dimension-card {
                            flex: 0 0 calc(33.333% - 11px);
                            background: white;
                            border-radius: 20px;
                            padding: 32px 24px;
                            text-align: center;
                            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
                            border: 1px solid #f0f0f0;
                        }
                        .dimension-card img {
                            width: 140px;
                            height: 140px;
                            object-fit: contain;
                            margin-bottom: 12px;
                        }
                        .dimension-card h3 {
                            margin: 0 0 12px;
                            font-size: 1.1rem;
                            color: #333;
                            font-weight: 600;
                        }
                        .dimension-card p {
                            margin: 0;
                            font-size: 0.9rem;
                            color: #888;
                            line-height: 1.7;
                        }
                        .carousel-btn {
                            position: absolute;
                            top: 50%;
                            transform: translateY(-50%);
                            width: 40px;
                            height: 40px;
                            background: white;
                            border: none;
                            border-radius: 50%;
                            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
                            cursor: pointer;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            z-index: 10;
                            transition: all 0.2s ease;
                        }
                        .carousel-btn:hover {
                            background: #FF8C94;
                            color: white;
                        }
                        .carousel-btn.prev { left: 0; }
                        .carousel-btn.next { right: 0; }
                        .carousel-btn:disabled {
                            opacity: 0.3;
                            cursor: not-allowed;
                        }
                        .carousel-dots {
                            display: flex;
                            justify-content: center;
                            gap: 8px;
                            margin-top: 20px;
                        }
                        .carousel-dot {
                            width: 8px;
                            height: 8px;
                            border-radius: 50%;
                            background: #ddd;
                            cursor: pointer;
                            transition: all 0.2s ease;
                        }
                        .carousel-dot.active {
                            background: #FF8C94;
                            width: 24px;
                            border-radius: 4px;
                        }
                        @media (max-width: 768px) {
                            .dimensions-carousel { padding: 0 32px; }
                            .dimension-card {
                                flex: 0 0 calc(50% - 8px);
                                padding: 24px 16px;
                            }
                            .dimension-card img {
                                width: 120px;
                                height: 120px;
                            }
                            .dimension-card h3 {
                                font-size: 1rem;
                            }
                            .dimension-card p {
                                font-size: 0.85rem;
                            }
                        }
                        @media (max-width: 480px) {
                            .dimensions-carousel { padding: 0 24px; }
                            .dimension-card {
                                flex: 0 0 100%;
                                padding: 28px 20px;
                            }
                        }
                    </style>
                    <div class="dimensions-carousel">
                        <button class="carousel-btn prev" onclick="moveCarousel(-1)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                        <div class="dimensions-track" id="dimensionsTrack">
                            ${defaultQuizData.dimensions.map(dim => `
                                <div class="dimension-card">
                                    <picture>
                                        <source srcset="assets/icon/${dim.dimension_name}.webp" type="image/webp">
                                        <source srcset="assets/icon/${dim.dimension_name}.png" type="image/png">
                                        <img src="assets/icon/${dim.dimension_name}.png?v=${timestamp}" alt="${dim.dimension_name}" loading="lazy" decoding="async">
                                    </picture>
                                    <h3>${dim.dimension_name}</h3>
                                    <p>${dim.description}</p>
                                </div>
                            `).join('')}
                        </div>
                        <button class="carousel-btn next" onclick="moveCarousel(1)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>
                    <div class="carousel-dots" id="carouselDots"></div>
                `;
                initCarousel();
            }
        }

        // 轮播控制
        let currentSlide = 0;
        let totalSlides = 0;
        let itemsPerView = 3;

        function updateItemsPerView() {
            if (window.innerWidth <= 480) {
                itemsPerView = 1;
            } else if (window.innerWidth <= 768) {
                itemsPerView = 2;
            } else {
                itemsPerView = 3;
            }
        }

        function initCarousel() {
            updateItemsPerView();
            const track = document.getElementById('dimensionsTrack');
            const dotsContainer = document.getElementById('carouselDots');
            if (!track || !dotsContainer) return;
            
            const cards = track.querySelectorAll('.dimension-card');
            totalSlides = Math.ceil(cards.length / itemsPerView);
            currentSlide = 0;
            
            // 创建指示点
            dotsContainer.innerHTML = '';
            for (let i = 0; i < totalSlides; i++) {
                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(i);
                dotsContainer.appendChild(dot);
            }
            
            updateCarousel();
            
            // 窗口大小变化时重新计算
            window.addEventListener('resize', () => {
                const oldItemsPerView = itemsPerView;
                updateItemsPerView();
                if (oldItemsPerView !== itemsPerView) {
                    totalSlides = Math.ceil(cards.length / itemsPerView);
                    currentSlide = Math.min(currentSlide, totalSlides - 1);
                    // 重新生成指示点
                    dotsContainer.innerHTML = '';
                    for (let i = 0; i < totalSlides; i++) {
                        const dot = document.createElement('div');
                        dot.className = 'carousel-dot' + (i === currentSlide ? ' active' : '');
                        dot.onclick = () => goToSlide(i);
                        dotsContainer.appendChild(dot);
                    }
                    updateCarousel();
                }
            });
        }

        function moveCarousel(direction) {
            currentSlide += direction;
            if (currentSlide < 0) currentSlide = 0;
            if (currentSlide >= totalSlides) currentSlide = totalSlides - 1;
            updateCarousel();
        }

        function goToSlide(index) {
            currentSlide = index;
            updateCarousel();
        }

        function updateCarousel() {
            const track = document.getElementById('dimensionsTrack');
            const prevBtn = document.querySelector('.carousel-btn.prev');
            const nextBtn = document.querySelector('.carousel-btn.next');
            const dots = document.querySelectorAll('.carousel-dot');
            
            if (!track) return;
            
            const cardWidth = track.querySelector('.dimension-card')?.offsetWidth || 0;
            const gap = 16;
            const offset = currentSlide * (cardWidth + gap) * itemsPerView;
            track.style.transform = `translateX(-${offset}px)`;
            
            // 更新按钮状态
            if (prevBtn) prevBtn.disabled = currentSlide === 0;
            if (nextBtn) nextBtn.disabled = currentSlide === totalSlides - 1;
            
            // 更新指示点
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentSlide);
            });
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', () => {
            applyUIConfig();
            loadQuizData();
        });
    </script>
</body>
</html>
